<!DOCTYPE html>
<html>
<head>
<title>Battle Zone Pro</title>

<style>
body { margin:0; overflow:hidden; background:black; font-family:Arial; }
canvas { display:block; }

/* HUD */
#hud {
 position:absolute;
 width:100%;
 height:100%;
 pointer-events:none;
 color:white;
}

/* Top Left (Health + Ammo) */
#topLeft {
 position:absolute;
 top:10px;
 left:10px;
 background:rgba(0,0,0,0.6);
 padding:10px;
 border-radius:10px;
}

#healthBar {
 width:200px;
 height:15px;
 background:red;
 border-radius:10px;
 overflow:hidden;
 margin-bottom:5px;
}

#healthFill {
 height:100%;
 background:lime;
 width:100%;
}

/* Mini Map */
#miniMap {
 position:absolute;
 top:10px;
 right:10px;
 width:120px;
 height:120px;
 background:rgba(0,0,0,0.6);
 border:2px solid white;
 border-radius:10px;
}

/* Fire Button */
#fireBtn {
 position:absolute;
 bottom:40px;
 right:40px;
 width:70px;
 height:70px;
 background:red;
 border-radius:50%;
 text-align:center;
 line-height:70px;
 font-size:20px;
 pointer-events:auto;
 cursor:pointer;
}

/* Ability Button */
#abilityBtn {
 position:absolute;
 bottom:40px;
 right:130px;
 width:60px;
 height:60px;
 background:blue;
 border-radius:50%;
 text-align:center;
 line-height:60px;
 pointer-events:auto;
 cursor:pointer;
}

/* Crosshair */
#crosshair {
 position:absolute;
 top:50%;
 left:50%;
 width:20px;
 height:20px;
 margin-left:-10px;
 margin-top:-10px;
 border:2px solid white;
 border-radius:50%;
}
</style>
</head>

<body>

<canvas id="gameCanvas"></canvas>

<div id="hud">

<div id="topLeft">
<div id="healthBar"><div id="healthFill"></div></div>
<div id="info">Ammo: 10</div>
</div>

<div id="miniMap"></div>

<div id="fireBtn">FIRE</div>
<div id="abilityBtn">⚡</div>

<div id="crosshair"></div>

</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
let player = {x:400,y:300,size:15,speed:5,health:100};

// Game objects
let bullets = [];
let enemies = [];
let zone = {x:400,y:300,radius:300};

let ammo = 10;

// Movement
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

// Fire button (mobile + click)
document.getElementById("fireBtn").onclick = shoot;

canvas.addEventListener("click", shoot);

function shoot(e){
 if(ammo<=0) return;

 let mx = player.x;
 let my = player.y;

 bullets.push({
  x:player.x,
  y:player.y,
  dx:1,
  dy:0,
  speed:8
 });

 ammo--;
}

// Ability button
document.getElementById("abilityBtn").onclick = ()=>{
 player.speed = 10;
 setTimeout(()=>player.speed=5,2000);
};

// Enemy spawn
setInterval(()=>{
 enemies.push({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  size:15,
  health:50
 });
},2000);

// Game loop
function update(){

 if(keys["w"]) player.y-=player.speed;
 if(keys["s"]) player.y+=player.speed;
 if(keys["a"]) player.x-=player.speed;
 if(keys["d"]) player.x+=player.speed;

 bullets.forEach((b,i)=>{
  b.x += b.speed;

  enemies.forEach((e,ei)=>{
   let d = Math.hypot(b.x-e.x,b.y-e.y);
   if(d < e.size){
    e.health -= 25;
    bullets.splice(i,1);
   }
  });
 });

 enemies.forEach((e,ei)=>{
  let dx = player.x-e.x;
  let dy = player.y-e.y;
  let dist = Math.hypot(dx,dy);

  e.x += dx/dist * 2;
  e.y += dy/dist * 2;

  if(dist < 20){
   player.health -= 0.3;
  }

  if(e.health<=0){
   enemies.splice(ei,1);
  }
 });

 // Safe zone
 zone.radius -= 0.02;
 let d = Math.hypot(player.x-zone.x, player.y-zone.y);
 if(d > zone.radius) player.health -= 0.3;

 // UI
 document.getElementById("healthFill").style.width = player.health + "%";
 document.getElementById("info").innerText = "Ammo: " + ammo;

 if(player.health <= 0){
  alert("Game Over");
  location.reload();
 }
}

// Draw
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 // Zone
 ctx.strokeStyle="lime";
 ctx.beginPath();
 ctx.arc(zone.x,zone.y,zone.radius,0,Math.PI*2);
 ctx.stroke();

 // Player
 ctx.fillStyle="cyan";
 ctx.beginPath();
 ctx.arc(player.x,player.y,player.size,0,Math.PI*2);
 ctx.fill();

 // Bullets
 ctx.fillStyle="white";
 bullets.forEach(b=>{
  ctx.beginPath();
  ctx.arc(b.x,b.y,3,0,Math.PI*2);
  ctx.fill();
 });

 // Enemies
 ctx.fillStyle="red";
 enemies.forEach(e=>{
  ctx.beginPath();
  ctx.arc(e.x,e.y,e.size,0,Math.PI*2);
  ctx.fill();
 });
}

// Loop
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
